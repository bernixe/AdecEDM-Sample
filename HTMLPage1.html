<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adecco Professional Template</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #f4f4f4;
            padding-bottom: 40px;
        }

        .main {
            background-color: #ffffff;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            border-spacing: 0;
            color: #333333;
        }

        .header {
            background-color: #da291c;
            padding: 20px;
            text-align: center;
        }
        /* Adecco Red */
        .content {
            padding: 30px;
            line-height: 1.6;
        }

        .button {
            background-color: #da291c;
            color: #ffffff;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
        }

        .footer {
            background-color: #333333;
            color: #ffffff;
            padding: 20px;
            text-align: center;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <center class="wrapper">
        <table class="main" width="100%">
            <tr>
                <td class="header" pardot-region="header_image">
                    <h1 style="color: white; margin: 0;">Adecco</h1>
                </td>
            </tr>

            <tr>
                <td pardot-region="hero_section">
                    <img src="https://via.placeholder.com/600x300" alt="Banner" width="600" style="width: 100%; max-width: 600px; height: auto; display: block;">
                </td>
            </tr>

            <tr>
                <td class="content">
                    <div pardot-region="main_content">
                        <h2>Your Career Partners</h2>
                        <p>Hello there,</p>
                        <p>This is a custom-coded HTML template designed specifically for Pardot integration. It features responsive design principles and editable regions for marketing teams.</p>
                        <a href="#" class="button">View Opportunities</a>
                    </div>
                </td>
            </tr>

            <tr>
                <td class="footer">
                    <div pardot-region="footer_text">
                        <p>&copy; 2026 Adecco. All rights reserved.</p>
                        <p>Unsubscribe | Privacy Policy</p>
                    </div>
                </td>
            </tr>
        </table>
    </center>
</body>
</html>
